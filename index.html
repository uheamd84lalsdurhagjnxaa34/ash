// === THEME AND FONT MANAGEMENT ===
(function(){
  const THEME_KEY="current_theme", FONT_KEY="current_font", CUSTOM_CONFIG_KEY="custom_theme_config", DEFAULT_THEME="vapor";
  window.applyVtheme=()=>{return new Promise((resolve)=>{
    const theme=localStorage.getItem(THEME_KEY)||DEFAULT_THEME, root=document.documentElement;
    const vars=["--bg","--secondary-bg","--third-bg","--fourth-bg","--primary","--secondary","--text-color","--secondary-text-color","--button-bg","--button-hover","--gradient-start","--gradient-end","--accent","--cb","--bc"];
    if(theme==="custom"){const customConfig=JSON.parse(localStorage.getItem(CUSTOM_CONFIG_KEY)||"{}");vars.forEach(v=>{if(customConfig[v])root.style.setProperty(v,customConfig[v])});root.setAttribute("data-theme","custom");resolve();return;}
    vars.forEach(v=>root.style.removeProperty(v));
    const isAlt=localStorage.getItem("is_alt_theme")==="true", folder=isAlt?"alt-theme":"theme", themePath=`/style/${folder}/${theme}.css`;
    document.documentElement.setAttribute("data-theme",theme);
    let themeLink=document.getElementById("theme-link");if(!themeLink){themeLink=document.createElement("link");themeLink.id="theme-link";themeLink.rel="stylesheet";document.head.appendChild(themeLink);}
    const timeout=setTimeout(resolve,1500);themeLink.onload=()=>{clearTimeout(timeout);resolve();};themeLink.onerror=()=>{clearTimeout(timeout);resolve();};
    themeLink.href=themePath;
  })};
  window.applyVfont=()=>{const fontName=localStorage.getItem(FONT_KEY);let styleEl=document.getElementById("dynamic-font-style");if(!fontName||fontName.trim()===""||fontName.toLowerCase()==="default"){if(styleEl)styleEl.remove();return;}const fontUrl=`https://fonts.googleapis.com/css2?family=${fontName.replace(/ /g,"+")}:wght@400;700&display=swap`;if(!styleEl){styleEl=document.createElement("style");styleEl.id="dynamic-font-style";document.head.appendChild(styleEl);}styleEl.innerHTML=`@import url('${fontUrl}'); * { font-family: '${fontName}', sans-serif !important; }`;}
  applyVtheme();applyVfont();
  window.addEventListener("storage",e=>{if(e.key===THEME_KEY||e.key===CUSTOM_CONFIG_KEY)applyVtheme();if(e.key===FONT_KEY)applyVfont();});
})();

// === JAVASCRIPT LOGIC ===
const browserView=document.getElementById("browser-view"), grid=document.getElementById("grid"), noResultsMessage=document.querySelector(".no-results-message"), listDescription=document.getElementById("list-description"), dropdowns=document.querySelectorAll(".dropdown-wrapper"), gameOverlay=document.getElementById("game-overlay"), sourceDropdownWrapper=document.getElementById("source-dropdown-wrapper"), sourceOptionsContainer=document.getElementById("source-options-container"), sourceSelectorText=sourceDropdownWrapper.querySelector(".dropdown-menu .dropdown-text"), sourceSelectorIcon=document.getElementById("current-source-icon"), searchBar=document.querySelector(".search-bar"), input=searchBar.querySelector("input"), filterDropdownIcon=document.querySelector(".filter-icon"), filterDropdownWrapper=document.getElementById("filter-dropdown-wrapper"), backdrop=document.getElementById("backdrop"), iframe=document.getElementById("game-content-frame"), loadingContainer=document.getElementById("loading-container"), loadingMessage=document.getElementById("loading-message"), buttonPanel=document.getElementById("button-panel"), fullscreenBtn=document.getElementById("fullscreen-btn"), backBtn=document.getElementById("back-btn"), globalSearchBtn=document.getElementById("global-search-btn"), globalStatusText=document.getElementById("global-status-text");

let currentFilteredList=[], renderedCount=0, BATCH_SIZE=50, sentinel=document.createElement("div"); sentinel.style.height="20px"; sentinel.style.width="100%";
let imageObserver, scrollObserver, currentSourceData=null, currentFilter="default", allGames=[], switchTextTimeout, gameLists=[], userIPPrefix="", isGlobalSearchActive=false, debounceTimer=[];

// Gradient palette
const GRADIENT_PALETTE=[]; for(let i=0;i<20;i++){const hue=Math.floor((360/20)*i);GRADIENT_PALETTE.push(`linear-gradient(135deg, hsl(${hue}, 55%, 65%), hsl(${(hue+40)%360},55%,55%))`);}
function getRandomSoftBackground(){return GRADIENT_PALETTE[Math.floor(Math.random()*GRADIENT_PALETTE.length)];}

document.addEventListener("DOMContentLoaded", () => {
  let debounceTimer;
  let userIPPrefix = "";
  let isGlobalSearchActive = false;
  let allGames = [];
  let currentFilteredList = [];
  let renderedCount = 0;
  let imageObserver, scrollObserver;
  let currentSourceData = null;
  let gameLists = [];
  let currentFilter = "featured";
  let switchTextTimeout;
  const BATCH_SIZE = 20;

  const input = document.querySelector("#search-input");
  const grid = document.querySelector("#games-grid");
  const loadingMessage = document.querySelector("#loading-message");
  const loadingContainer = document.querySelector("#loading-container");
  const gameOverlay = document.querySelector("#game-overlay");
  const iframe = document.querySelector("#game-frame");
  const buttonPanel = document.querySelector("#button-panel");
  const fullscreenBtn = document.querySelector("#fullscreen-btn");
  const backBtn = document.querySelector("#back-btn");
  const sourceSelectorText = document.querySelector("#source-text");
  const sourceSelectorIcon = document.querySelector("#source-icon");
  const sourceOptionsContainer = document.querySelector("#source-options");
  const sourceDropdownWrapper = document.querySelector("#source-dropdown");
  const filterDropdownWrapper = document.querySelector("#filter-dropdown");
  const filterDropdownIcon = document.querySelector("#filter-icon");
  const backdrop = document.querySelector("#backdrop");
  const noResultsMessage = document.querySelector("#no-results-message");
  const listDescription = document.querySelector("#list-description");
  const globalSearchBtn = document.querySelector("#global-search-btn");
  const dropdowns = document.querySelectorAll(".dropdown-wrapper");
  const sentinel = document.createElement("div");

  function runSearchDebounced() {
    clearTimeout(debounceTimer);
    const delay = isGlobalSearchActive ? 500 : 300;
    debounceTimer = setTimeout(() => {
      filterSortGames();
    }, delay);
  }

  async function fetchUserIP() {
    try {
      const response = await fetch("/api/ip");
      if (!response.ok) throw new Error("IP Fetch failed");
      const data = await response.json();
      userIPPrefix = data.ip.split(".")[0];
    } catch (error) {
      console.warn("Could not fetch user IP, ngg games will not work:", error);
      userIPPrefix = "";
    }
  }

  function setSearchPlaceholder() {
    if (isGlobalSearchActive) {
      input.placeholder = "Search all sources...";
    } else {
      input.placeholder = currentSourceData
        ? `Search ${currentSourceData.Name}...`
        : "Search Games...";
    }
  }

  function handleScrollMasks() {
    grid.classList.toggle("show-top-mask", grid.scrollTop > 10);
    const isAtBottom =
      grid.scrollHeight - grid.scrollTop <= grid.clientHeight + 10;
    grid.classList.toggle(
      "show-bottom-mask",
      !isAtBottom && grid.scrollHeight > grid.clientHeight
    );
  }

  async function performGlobalSearch() {
    const query = input.value.toLowerCase();
    if (!query) {
      clearGrid();
      noResultsMessage.style.display = "none";
      return;
    }

    globalStatusText.classList.add("visible");
    grid.classList.add("fade-games");

    try {
      const searchPromises = gameLists.map(async (source) => {
        try {
          const res = await fetch(source.File);
          if (!res.ok) return [];
          const games = await res.json();
          return games
            .filter((g) => g.name.toLowerCase().includes(query))
            .map((g) => ({
              ...g,
              sourceName: source.Name,
              sourceIcon: source.Icon || "ri-file-line",
              sourceType: source.Type,
            }));
        } catch (e) {
          return [];
        }
      });

      const results = await Promise.all(searchPromises);
      let combinedResults = results.flat();

      const unique = [];
      const seen = new Set();
      combinedResults.forEach((item) => {
        const id = `${item.name}-${item.url}`;
        if (!seen.has(id)) {
          unique.push(item);
          seen.add(id);
        }
      });

      if (currentFilter === "alphabetical") {
        unique.sort((a, b) => a.name.localeCompare(b.name));
      }

      currentFilteredList = unique;
      clearGrid();

      noResultsMessage.style.display =
        currentFilteredList.length === 0 ? "block" : "none";

      renderNextBatch();
    } catch (err) {
      console.error("Global search failed:", err);
    } finally {
      globalStatusText.classList.remove("visible");
      grid.classList.remove("fade-games");
      handleScrollMasks();
    }
  }

  function clearGrid() {
    renderedCount = 0;
    const itemsToRemove = grid.querySelectorAll(
      ".card, .games-divider, #sentinel-marker"
    );
    itemsToRemove.forEach((item) => item.remove());
  }

  function filterSortGames() {
    if (isGlobalSearchActive) {
      performGlobalSearch();
      return;
    }

    const query = input.value.toLowerCase();
    let filteredGames = allGames.filter((game) =>
      game.name.toLowerCase().includes(query)
    );

    if (currentFilter === "alphabetical") {
      filteredGames.sort((a, b) => a.name.localeCompare(b.name));
      currentFilteredList = filteredGames;
    } else {
      const featured = filteredGames.filter((g) => g.featured);
      const regular = filteredGames.filter((g) => !g.featured);

      currentFilteredList = [...featured];
      if (featured.length > 0 && regular.length > 0) {
        currentFilteredList.push({ isDivider: true });
      }
      currentFilteredList.push(...regular);
    }

    clearGrid();
    noResultsMessage.style.display =
      filteredGames.length === 0 && query !== "" ? "block" : "none";

    renderNextBatch();
    handleScrollMasks();
  }

  function loadImage(card) {
    if (card.classList.contains("loaded")) return;
    const imageUrl = card.dataset.src;

    if (!imageUrl) {
      card.style.setProperty("--bg-image", getRandomSoftBackground());
      card.classList.add("no-image-style", "loaded");
      return;
    }

    const img = new Image();
    img.src = imageUrl;
    img.onload = () => {
      card.style.setProperty("--bg-image", `url('${imageUrl}')`);
      card.classList.remove("no-image-style");
      card.classList.add("loaded");
    };
    img.onerror = () => {
      card.style.setProperty("--bg-image", getRandomSoftBackground());
      card.classList.add("no-image-style", "loaded");
    };
  }

  function setupObservers() {
    imageObserver = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            loadImage(entry.target);
            imageObserver.unobserve(entry.target);
          }
        });
      },
      { root: grid, rootMargin: "200px" }
    );

    scrollObserver = new IntersectionObserver(
      (entries) => {
        if (entries[0].isIntersecting) {
          renderNextBatch();
        }
      },
      { root: grid, rootMargin: "600px" }
    );
  }

  function createCardElement(game) {
    const card = document.createElement("div");
    card.className = game.featured ? "card featured" : "card";

    const isDirect = game.direct === true || game.sourceType === "frame";
    const isNowgg = game.nowgg === true;
    const isPrx = game.prx === true || game.sourceType === "proxy";

    let displayType = "LOCAL";
    if (isNowgg) displayType = "NGG";
    else if (isPrx) displayType = "PRX";
    else if (isDirect) displayType = "FRAME";

    card.dataset.name = game.name.toLowerCase();

    const name = document.createElement("div");
    name.className = "card-name";
    name.textContent = game.name;
    card.appendChild(name);

    const infoContainer = document.createElement("div");
    infoContainer.className = "card-info-container";

    const icon = document.createElement("i");
    icon.className = game.sourceIcon || sourceSelectorIcon.className;
    infoContainer.appendChild(icon);

    const textStack = document.createElement("div");
    textStack.className = "card-info-text";

    if (isGlobalSearchActive && game.sourceName) {
      const sourceLabel = document.createElement("div");
      sourceLabel.className = "card-source-name";
      sourceLabel.textContent = game.sourceName;
      textStack.appendChild(sourceLabel);
    } else {
      const typeLabel = document.createElement("div");
      typeLabel.className = "card-type";
      typeLabel.textContent = displayType;
      textStack.appendChild(typeLabel);
    }

    infoContainer.appendChild(textStack);
    card.appendChild(infoContainer);

    card.addEventListener("click", () => {
      playGame(game.url, isDirect, game.name, isNowgg, isPrx);
    });

    const imageUrl = game.cover;
    if (imageUrl && imageUrl !== "null" && imageUrl !== "") {
      card.dataset.src = imageUrl;
    }

    return card;
  }

  function renderNextBatch() {
    if (renderedCount >= currentFilteredList.length) return;

    const fragment = document.createDocumentFragment();
    const nextBatch = currentFilteredList.slice(
      renderedCount,
      renderedCount + BATCH_SIZE
    );

    nextBatch.forEach((item) => {
      if (item.isDivider) {
        const div = document.createElement("div");
        div.className = "games-divider";
        fragment.appendChild(div);
      } else {
        const card = createCardElement(item);
        fragment.appendChild(card);
        imageObserver.observe(card);
      }
    });

    sentinel.remove();
    grid.appendChild(fragment);
    renderedCount += nextBatch.length;

    if (renderedCount < currentFilteredList.length) {
      sentinel.id = "sentinel-marker";
      grid.appendChild(sentinel);
      scrollObserver.observe(sentinel);
    }
  }

  // ... continue with the rest of your original code here ...
  // loadGames(), init(), playGame(), event listeners etc.

  init(); // initialize everything after DOM is ready
});

  let imageObserver, scrollObserver;
  let currentSourceData = null;
  let gameLists = [];
  let currentFilter = "featured";
  let switchTextTimeout;
  const BATCH_SIZE = 20;

  const input = document.querySelector("#search-input");
  const grid = document.querySelector("#games-grid");
  const loadingMessage = document.querySelector("#loading-message");
  const loadingContainer = document.querySelector("#loading-container");
  const gameOverlay = document.querySelector("#game-overlay");
  const iframe = document.querySelector("#game-frame");
  const buttonPanel = document.querySelector("#button-panel");
  const fullscreenBtn = document.querySelector("#fullscreen-btn");
  const backBtn = document.querySelector("#back-btn");
  const sourceSelectorText = document.querySelector("#source-text");
  const sourceSelectorIcon = document.querySelector("#source-icon");
  const sourceOptionsContainer = document.querySelector("#source-options");
  const sourceDropdownWrapper = document.querySelector("#source-dropdown");
  const filterDropdownWrapper = document.querySelector("#filter-dropdown");
  const filterDropdownIcon = document.querySelector("#filter-icon");
  const backdrop = document.querySelector("#backdrop");
  const noResultsMessage = document.querySelector("#no-results-message");
  const listDescription = document.querySelector("#list-description");
  const globalSearchBtn = document.querySelector("#global-search-btn");
  const dropdowns = document.querySelectorAll(".dropdown-wrapper");
  const sentinel = document.createElement("div");

  function runSearchDebounced() {
    clearTimeout(debounceTimer);
    const delay = isGlobalSearchActive ? 500 : 300;
    debounceTimer = setTimeout(() => {
      filterSortGames();
    }, delay);
  }

  async function fetchUserIP() {
    try {
      const response = await fetch("/api/ip");
      if (!response.ok) throw new Error("IP Fetch failed");
      const data = await response.json();
      userIPPrefix = data.ip.split(".")[0];
    } catch (error) {
      console.warn("Could not fetch user IP, ngg games will not work:", error);
      userIPPrefix = "";
    }
  }

  function setSearchPlaceholder() {
    if (isGlobalSearchActive) {
      input.placeholder = "Search all sources...";
    } else {
      input.placeholder = currentSourceData
        ? `Search ${currentSourceData.Name}...`
        : "Search Games...";
    }
  }

  function handleScrollMasks() {
    grid.classList.toggle("show-top-mask", grid.scrollTop > 10);
    const isAtBottom =
      grid.scrollHeight - grid.scrollTop <= grid.clientHeight + 10;
    grid.classList.toggle(
      "show-bottom-mask",
      !isAtBottom && grid.scrollHeight > grid.clientHeight
    );
  }

  async function performGlobalSearch() {
    const query = input.value.toLowerCase();
    if (!query) {
      clearGrid();
      noResultsMessage.style.display = "none";
      return;
    }

    globalStatusText.classList.add("visible");
    grid.classList.add("fade-games");

    try {
      const searchPromises = gameLists.map(async (source) => {
        try {
          const res = await fetch(source.File);
          if (!res.ok) return [];
          const games = await res.json();
          return games
            .filter((g) => g.name.toLowerCase().includes(query))
            .map((g) => ({
              ...g,
              sourceName: source.Name,
              sourceIcon: source.Icon || "ri-file-line",
              sourceType: source.Type,
            }));
        } catch (e) {
          return [];
        }
      });

      const results = await Promise.all(searchPromises);
      let combinedResults = results.flat();

      const unique = [];
      const seen = new Set();
      combinedResults.forEach((item) => {
        const id = `${item.name}-${item.url}`;
        if (!seen.has(id)) {
          unique.push(item);
          seen.add(id);
        }
      });

      if (currentFilter === "alphabetical") {
        unique.sort((a, b) => a.name.localeCompare(b.name));
      }

      currentFilteredList = unique;
      clearGrid();

      noResultsMessage.style.display =
        currentFilteredList.length === 0 ? "block" : "none";

      renderNextBatch();
    } catch (err) {
      console.error("Global search failed:", err);
    } finally {
      globalStatusText.classList.remove("visible");
      grid.classList.remove("fade-games");
      handleScrollMasks();
    }
  }

  function clearGrid() {
    renderedCount = 0;
    const itemsToRemove = grid.querySelectorAll(
      ".card, .games-divider, #sentinel-marker"
    );
    itemsToRemove.forEach((item) => item.remove());
  }

  function filterSortGames() {
    if (isGlobalSearchActive) {
      performGlobalSearch();
      return;
    }

    const query = input.value.toLowerCase();
    let filteredGames = allGames.filter((game) =>
      game.name.toLowerCase().includes(query)
    );

    if (currentFilter === "alphabetical") {
      filteredGames.sort((a, b) => a.name.localeCompare(b.name));
      currentFilteredList = filteredGames;
    } else {
      const featured = filteredGames.filter((g) => g.featured);
      const regular = filteredGames.filter((g) => !g.featured);

      currentFilteredList = [...featured];
      if (featured.length > 0 && regular.length > 0) {
        currentFilteredList.push({ isDivider: true });
      }
      currentFilteredList.push(...regular);
    }

    clearGrid();
    noResultsMessage.style.display =
      filteredGames.length === 0 && query !== "" ? "block" : "none";

    renderNextBatch();
    handleScrollMasks();
  }

  function loadImage(card) {
    if (card.classList.contains("loaded")) return;
    const imageUrl = card.dataset.src;

    if (!imageUrl) {
      card.style.setProperty("--bg-image", getRandomSoftBackground());
      card.classList.add("no-image-style", "loaded");
      return;
    }

    const img = new Image();
    img.src = imageUrl;
    img.onload = () => {
      card.style.setProperty("--bg-image", `url('${imageUrl}')`);
      card.classList.remove("no-image-style");
      card.classList.add("loaded");
    };
    img.onerror = () => {
      card.style.setProperty("--bg-image", getRandomSoftBackground());
      card.classList.add("no-image-style", "loaded");
    };
  }

  function setupObservers() {
    imageObserver = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            loadImage(entry.target);
            imageObserver.unobserve(entry.target);
          }
        });
      },
      { root: grid, rootMargin: "200px" }
    );

    scrollObserver = new IntersectionObserver(
      (entries) => {
        if (entries[0].isIntersecting) {
          renderNextBatch();
        }
      },
      { root: grid, rootMargin: "600px" }
    );
  }

  function createCardElement(game) {
    const card = document.createElement("div");
    card.className = game.featured ? "card featured" : "card";

    const isDirect = game.direct === true || game.sourceType === "frame";
    const isNowgg = game.nowgg === true;
    const isPrx = game.prx === true || game.sourceType === "proxy";

    let displayType = "LOCAL";
    if (isNowgg) displayType = "NGG";
    else if (isPrx) displayType = "PRX";
    else if (isDirect) displayType = "FRAME";

    card.dataset.name = game.name.toLowerCase();

    const name = document.createElement("div");
    name.className = "card-name";
    name.textContent = game.name;
    card.appendChild(name);

    const infoContainer = document.createElement("div");
    infoContainer.className = "card-info-container";

    const icon = document.createElement("i");
    icon.className = game.sourceIcon || sourceSelectorIcon.className;
    infoContainer.appendChild(icon);

    const textStack = document.createElement("div");
    textStack.className = "card-info-text";

    if (isGlobalSearchActive && game.sourceName) {
      const sourceLabel = document.createElement("div");
      sourceLabel.className = "card-source-name";
      sourceLabel.textContent = game.sourceName;
      textStack.appendChild(sourceLabel);
    } else {
      const typeLabel = document.createElement("div");
      typeLabel.className = "card-type";
      typeLabel.textContent = displayType;
      textStack.appendChild(typeLabel);
    }

    infoContainer.appendChild(textStack);
    card.appendChild(infoContainer);

    card.addEventListener("click", () => {
      playGame(game.url, isDirect, game.name, isNowgg, isPrx);
    });

    const imageUrl = game.cover;
    if (imageUrl && imageUrl !== "null" && imageUrl !== "") {
      card.dataset.src = imageUrl;
    }

    return card;
  }

  function renderNextBatch() {
    if (renderedCount >= currentFilteredList.length) return;

    const fragment = document.createDocumentFragment();
    const nextBatch = currentFilteredList.slice(
      renderedCount,
      renderedCount + BATCH_SIZE
    );

    nextBatch.forEach((item) => {
      if (item.isDivider) {
        const div = document.createElement("div");
        div.className = "games-divider";
        fragment.appendChild(div);
      } else {
        const card = createCardElement(item);
        fragment.appendChild(card);
        imageObserver.observe(card);
      }
    });

    sentinel.remove();
    grid.appendChild(fragment);
    renderedCount += nextBatch.length;

    if (renderedCount < currentFilteredList.length) {
      sentinel.id = "sentinel-marker";
      grid.appendChild(sentinel);
      scrollObserver.observe(sentinel);
    }
  }

  // ... continue with the rest of your original code here ...
  // loadGames(), init(), playGame(), event listeners etc.

  init(); // initialize everything after DOM is ready
});
</script>
